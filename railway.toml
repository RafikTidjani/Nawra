# Railway configuration for VELORA
# Le projet Next.js est dans le sous-dossier nawra-project

[build]
builder = "NIXPACKS"
watchPatterns = ["nawra-project/**"]

[deploy]
startCommand = "cd nawra-project && npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
